<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QR Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
      --accent: #00ffb2; --text: #e8e8f0; --muted: #5a5a72;
      --danger: #ff4560; --glow: 0 0 20px rgba(0,255,178,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    header { width: 100%; padding: 20px 24px 0; display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; border: 2px solid var(--accent); display: grid; grid-template-columns: 1fr 1fr; gap: 3px; padding: 5px; animation: pulse-border 3s ease-in-out infinite; }
    .logo-mark span { background: var(--accent); display: block; }
    .logo-mark span:nth-child(3) { background: transparent; border: 1.5px solid var(--accent); }
    @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 rgba(0,255,178,0)} 50%{box-shadow:var(--glow)} }
    h1 { font-size: 1.1rem; font-weight: 800; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); }
    h1 span { color: var(--muted); font-weight: 400; }
    .main { width: 100%; max-width: 480px; padding: 20px 20px 40px; display: flex; flex-direction: column; gap: 20px; }
    .viewport-wrapper { position: relative; width: 100%; aspect-ratio: 1; border-radius: 4px; overflow: hidden; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { display: none; }
    .corners { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    .corner { position: absolute; width: 28px; height: 28px; }
    .corner::before,.corner::after { content: ''; position: absolute; background: var(--accent); }
    .corner::before { width: 100%; height: 3px; top: 0; }
    .corner::after  { width: 3px; height: 100%; top: 0; }
    .corner.tl { top: 14px; left: 14px; }
    .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .corner.br { bottom: 14px; right: 14px; transform: scale(-1); }
    .scan-line { position: absolute; left: 14px; right: 14px; height: 2px; background: linear-gradient(90deg,transparent,var(--accent),transparent); box-shadow: 0 0 8px var(--accent),0 0 20px rgba(0,255,178,.4); top: 14px; animation: scan 2.5s ease-in-out infinite; z-index: 2; }
    @keyframes scan { 0%{top:14px;opacity:1} 45%{top:calc(100% - 14px);opacity:1} 50%{top:calc(100% - 14px);opacity:0} 55%{top:14px;opacity:0} 60%{opacity:1} 100%{top:14px;opacity:1} }
    .flash { position: absolute; inset: 0; background: rgba(0,255,178,.15); opacity: 0; pointer-events: none; z-index: 3; transition: opacity .1s; }
    .flash.active { opacity: 1; }
    .state-badge { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.7); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-family: 'Space Mono',monospace; font-size: .62rem; letter-spacing: .1em; color: var(--muted); white-space: nowrap; z-index: 4; backdrop-filter: blur(4px); }
    .state-badge.scanning { color: var(--accent); border-color: rgba(0,255,178,.3); }
    .state-badge.found    { color: #000; background: var(--accent); border-color: var(--accent); }
    .idle-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: var(--surface); z-index: 5; }
    .idle-screen svg { opacity: .25; }
    .idle-screen p { font-size: .8rem; color: var(--muted); text-align: center; max-width: 200px; line-height: 1.6; }
    #startBtn { padding: 14px 32px; background: var(--accent); color: #000; border: none; font-family: 'Syne',sans-serif; font-size: .9rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: transform .15s; box-shadow: var(--glow); }
    #startBtn:active { transform: scale(.96); }
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color .3s; }
    .result-card.has-result { border-color: rgba(0,255,178,.35); }
    .result-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .result-label { font-family: 'Space Mono',monospace; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .result-type-badge { font-family: 'Space Mono',monospace; font-size: .6rem; padding: 2px 8px; border-radius: 10px; background: rgba(124,58,237,.2); color: #a78bfa; border: 1px solid rgba(124,58,237,.3); text-transform: uppercase; letter-spacing: .08em; }
    .result-body { padding: 16px; min-height: 80px; display: flex; align-items: flex-start; }
    #resultText { font-family: 'Space Mono',monospace; font-size: .78rem; line-height: 1.7; color: var(--muted); word-break: break-all; transition: color .3s; }
    #resultText.populated { color: var(--text); }
    #urlAction { display: none; padding: 0 16px 16px; }
    #urlAction a { display: inline-flex; align-items: center; gap: 8px; color: var(--accent); font-family: 'Space Mono',monospace; font-size: .72rem; text-decoration: none; border: 1px solid rgba(0,255,178,.3); padding: 8px 16px; border-radius: 3px; transition: background .2s; }
    #urlAction a:active { background: rgba(0,255,178,.1); }
    .history-section { display: flex; flex-direction: column; gap: 10px; }
    .section-title { font-family: 'Space Mono',monospace; font-size: .62rem; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    #historyList { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 10px; animation: slideIn .3s ease; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .history-icon { width: 24px; height: 24px; border-radius: 50%; background: rgba(0,255,178,.1); border: 1px solid rgba(0,255,178,.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
    .history-content { flex: 1; overflow: hidden; }
    .history-value { font-family: 'Space Mono',monospace; font-size: .72rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-meta { font-family: 'Space Mono',monospace; font-size: .58rem; color: var(--muted); margin-top: 3px; }
    .copy-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 10px; padding: 3px 8px; border-radius: 2px; cursor: pointer; font-family: 'Space Mono',monospace; flex-shrink: 0; transition: color .2s,border-color .2s; letter-spacing: .05em; }
    .copy-btn.copied { color: var(--accent); border-color: rgba(0,255,178,.4); }
    .empty-history { font-family: 'Space Mono',monospace; font-size: .68rem; color: var(--muted); text-align: center; padding: 16px 0; }
    .controls { display: flex; gap: 10px; }
    .ctrl-btn { flex: 1; padding: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'Syne',sans-serif; font-size: .75rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: background .2s; }
    .ctrl-btn.danger { color: var(--danger); border-color: rgba(255,69,96,.25); }
    #torchBtn.on { color: #fbbf24; border-color: rgba(251,191,36,.35); background: rgba(251,191,36,.08); }
  </style>
</head>
<body>
<header>
  <div class="logo-mark"><span></span><span></span><span></span><span></span></div>
  <h1>QR<span>/</span>SCAN</h1>
</header>
<div class="main">
  <div class="viewport-wrapper">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
    <div class="corners">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div class="scan-line"></div>
    <div class="flash" id="flash"></div>
    <div class="state-badge" id="stateBadge">IDLE</div>
    <div class="idle-screen" id="idleScreen">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="4" width="22" height="22" rx="2" stroke="#00ffb2" stroke-width="2"/>
        <rect x="10" y="10" width="10" height="10" fill="#00ffb2"/>
        <rect x="38" y="4" width="22" height="22" rx="2" stroke="#00ffb2" stroke-width="2"/>
        <rect x="44" y="10" width="10" height="10" fill="#00ffb2"/>
        <rect x="4" y="38" width="22" height="22" rx="2" stroke="#00ffb2" stroke-width="2"/>
        <rect x="10" y="44" width="10" height="10" fill="#00ffb2"/>
        <rect x="38" y="38" width="10" height="4" fill="#00ffb2"/>
        <rect x="38" y="46" width="4" height="14" fill="#00ffb2"/>
        <rect x="50" y="46" width="10" height="4" fill="#00ffb2"/>
        <rect x="56" y="50" width="4" height="10" fill="#00ffb2"/>
        <rect x="46" y="56" width="10" height="4" fill="#00ffb2"/>
      </svg>
      <p>Tap the button to start scanning with your camera</p>
      <button id="startBtn">START CAMERA</button>
    </div>
  </div>
  <div class="controls" id="controls" style="display:none">
    <button class="ctrl-btn" id="torchBtn">&#9889; TORCH</button>
    <button class="ctrl-btn" id="pauseBtn">&#9208; PAUSE</button>
    <button class="ctrl-btn danger" id="stopBtn">&#10005; STOP</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-label">Last Scanned</span>
      <span class="result-type-badge" id="resultType">&#8212;</span>
    </div>
    <div class="result-body"><span id="resultText">Waiting for scan&#8230;</span></div>
    <div id="urlAction"><a href="#" id="openUrl" target="_blank" rel="noopener">&#8599; Open URL</a></div>
  </div>
  <div class="history-section">
    <div class="section-title">Scan History</div>
    <div id="historyList"><div class="empty-history" id="emptyHistory">No scans yet</div></div>
  </div>
</div>
<script>
  var video=document.getElementById('video'),canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true}),badge=document.getElementById('stateBadge'),flash=document.getElementById('flash'),resultText=document.getElementById('resultText'),resultType=document.getElementById('resultType'),resultCard=document.getElementById('resultCard'),urlAction=document.getElementById('urlAction'),openUrl=document.getElementById('openUrl'),idleScreen=document.getElementById('idleScreen'),controls=document.getElementById('controls'),historyList=document.getElementById('historyList');
  var stream=null,animFrame=null,paused=false,torchOn=false,lastResult=null,track=null,history=[];
  document.getElementById('startBtn').addEventListener('click',startCamera);
  document.getElementById('torchBtn').addEventListener('click',toggleTorch);
  document.getElementById('pauseBtn').addEventListener('click',togglePause);
  document.getElementById('stopBtn').addEventListener('click',stopCamera);
  async function startCamera(){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:1280}},audio:false});
      video.srcObject=stream; track=stream.getVideoTracks()[0];
      await new Promise(function(r){video.onloadedmetadata=r;});
      video.play(); idleScreen.style.display='none'; controls.style.display='flex';
      setBadge('SCANNING','scanning'); scanLoop();
    }catch(err){
      document.querySelector('.idle-screen p').textContent='Camera access denied. Please allow camera permission in your browser settings and reload.';
      console.error(err);
    }
  }
  function stopCamera(){
    if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
    cancelAnimationFrame(animFrame); video.srcObject=null;
    idleScreen.style.display='flex'; controls.style.display='none';
    paused=false; torchOn=false;
    document.getElementById('torchBtn').classList.remove('on');
    document.getElementById('pauseBtn').textContent='\u23F8 PAUSE';
    setBadge('IDLE','');
  }
  function togglePause(){
    paused=!paused; var btn=document.getElementById('pauseBtn');
    if(paused){video.pause();cancelAnimationFrame(animFrame);setBadge('PAUSED','');btn.textContent='\u25B6 RESUME';}
    else{video.play();setBadge('SCANNING','scanning');btn.textContent='\u23F8 PAUSE';scanLoop();}
  }
  async function toggleTorch(){
    if(!track)return;
    var caps=track.getCapabilities&&track.getCapabilities();
    if(!caps||!caps.torch){alert('Torch not supported on this device/browser.');return;}
    torchOn=!torchOn;
    await track.applyConstraints({advanced:[{torch:torchOn}]});
    document.getElementById('torchBtn').classList.toggle('on',torchOn);
  }
  function scanLoop(){
    animFrame=requestAnimationFrame(function(){
      if(video.readyState===video.HAVE_ENOUGH_DATA){
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        var imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        var code=jsQR(imageData.data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});
        if(code&&code.data&&code.data!==lastResult){lastResult=code.data;onFound(code.data);}
      }
      if(!paused)scanLoop();
    });
  }
  function onFound(data){
    flash.classList.add('active'); setTimeout(function(){flash.classList.remove('active');},200);
    setBadge('FOUND!','found'); setTimeout(function(){setBadge('SCANNING','scanning');},1500);
    if(navigator.vibrate)navigator.vibrate([60,30,60]);
    var type=detectType(data);
    resultText.textContent=data; resultText.classList.add('populated');
    resultType.textContent=type; resultCard.classList.add('has-result');
    if(type==='URL'){urlAction.style.display='block';openUrl.href=data;}
    else{urlAction.style.display='none';}
    addHistory(data,type);
    setTimeout(function(){lastResult=null;},3000);
  }
  function detectType(d){
    if(/^https?:\/\//i.test(d))return 'URL';
    if(/^mailto:/i.test(d))return 'EMAIL';
    if(/^tel:/i.test(d))return 'PHONE';
    if(/^BEGIN:VCARD/i.test(d))return 'VCARD';
    if(/^BEGIN:VEVENT/i.test(d))return 'CALENDAR';
    if(/^WIFI:/i.test(d))return 'WIFI';
    if(/^\d+$/.test(d.trim()))return 'NUMBER';
    return 'TEXT';
  }
  function addHistory(data,type){
    var time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    history.unshift({data:data,type:type,time:time});
    if(history.length>20)history.pop();
    renderHistory();
  }
  function renderHistory(){
    historyList.innerHTML='';
    if(history.length===0){historyList.innerHTML='<div class="empty-history">No scans yet</div>';return;}
    history.forEach(function(item){
      var el=document.createElement('div'); el.className='history-item';
      el.innerHTML='<div class="history-icon">'+typeIcon(item.type)+'</div><div class="history-content"><div class="history-value">'+escHtml(item.data)+'</div><div class="history-meta">'+item.type+' &middot; '+item.time+'</div></div><button class="copy-btn" data-val="'+escAttr(item.data)+'">COPY</button>';
      el.querySelector('.copy-btn').addEventListener('click',function(){
        var val=this.dataset.val,btn=this;
        function done(){btn.textContent='DONE';btn.classList.add('copied');setTimeout(function(){btn.textContent='COPY';btn.classList.remove('copied');},1500);}
        if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(val).then(done).catch(function(){fallbackCopy(val,done);});}
        else{fallbackCopy(val,done);}
      });
      historyList.appendChild(el);
    });
  }
  function fallbackCopy(text,cb){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);cb();}
  function typeIcon(t){return{URL:'&#128279;',EMAIL:'&#9993;',PHONE:'&#128222;',VCARD:'&#128100;',WIFI:'&#128246;',CALENDAR:'&#128197;',NUMBER:'#',TEXT:'T'}[t]||'T';}
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function escAttr(s){return s.replace(/"/g,'&quot;');}
  function setBadge(text,cls){badge.textContent=text;badge.className='state-badge'+(cls?' '+cls:'');}
</script>
</body>
</html>
